<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horse Race Game — Scorekeeper</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <h1>🐎 Horse Race Game <span class="subtitle">Scorekeeper</span></h1>
</header>

<!-- SETUP SCREEN -->
<section id="setup-screen" class="screen">
  <div class="panel">
    <h2>Add Players</h2>
    <form id="add-player-form" class="add-player-row">
      <input id="player-name-input" type="text" placeholder="Player name" autocomplete="off" maxlength="20">
      <button type="submit">Add Player</button>
    </form>
    <ul id="player-chip-list" class="chip-list"></ul>
    <p id="setup-hint" class="hint">Add at least 2 players to start.</p>
    <button id="start-session-btn" class="primary-btn" disabled>Start Session</button>
  </div>
</section>

<!-- GAME SCREEN -->
<section id="game-screen" class="screen hidden">

  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">Round</span>
      <span id="round-number" class="status-value">1</span>
    </div>
    <div class="status-item">
      <span class="status-label">Pot</span>
      <span id="pot-value" class="status-value pot">$0.00</span>
    </div>
    <button id="undo-btn" class="secondary-btn undo-btn" disabled>Undo</button>
  </div>

  <div class="balances-panel">
    <table id="balances-table">
      <thead>
        <tr>
          <th class="bp-name-header">Player</th>
          <th>Round Net</th>
          <th>Balance</th>
        </tr>
      </thead>
      <tbody id="balances-body"></tbody>
    </table>
  </div>

  <div id="phase-banner" class="phase-banner"></div>

  <div id="action-panel" class="action-panel"></div>

  <div class="round-log-panel">
    <h2>This Round</h2>
    <ul id="round-log-list" class="round-log-list"></ul>
  </div>

  <div class="history-panel">
    <h2>Round History</h2>
    <ul id="history-list" class="history-list"></ul>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
